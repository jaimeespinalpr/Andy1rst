<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GasolinaPR - Precios en Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .tab-active { border-bottom: 3px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <nav class="bg-red-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-gas-pump"></i> GasolinaPR
            </h1>
            <div class="text-sm bg-red-700 px-3 py-1 rounded-full">
                Promedio Hoy: $0.93/L
            </div>
        </div>
    </nav>

    <!-- Main App -->
    <main class="container mx-auto p-4">
        <!-- Search & Filter -->
        <div class="mb-6 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" placeholder="Buscar por pueblo..." class="w-full p-4 rounded-xl shadow-sm border-none outline-red-500 text-lg">
            <select id="brandFilter" class="p-4 rounded-xl shadow-sm bg-white border-none text-lg">
                <option value="all">Todas las marcas</option>
                <option value="Puma">Puma</option>
                <option value="Gulf">Gulf</option>
                <option value="Shell">Shell</option>
                <option value="Mobil">Mobil</option>
                <option value="Ecomax">Ecomax</option>
            </select>
        </div>

        <!-- Gas Stations Grid -->
        <div id="stationsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Stations will be rendered here -->
        </div>
    </main>

    <!-- App Logic -->
    <script>
        const stations = [
            { id: 1, name: "Puma Energy", town: "San Juan", regular: 0.93, premium: 1.04, brand: "Puma", address: "Av. Kennedy" },
            { id: 2, name: "Gulf Station", town: "Guaynabo", regular: 0.91, premium: 1.01, brand: "Gulf", address: "Calle Marginal" },
            { id: 3, name: "Shell V-Power", town: "Bayamón", regular: 0.94, premium: 1.09, brand: "Shell", address: "Carr. #2" },
            { id: 4, name: "Mobil", town: "Caguas", regular: 0.92, premium: 1.03, brand: "Mobil", address: "Av. Degetau" },
            { id: 5, name: "Ecomax Plus", town: "Ponce", regular: 0.89, premium: 0.98, brand: "Ecomax", address: "Las Américas" },
            { id: 6, name: "Puma 24/7", town: "Carolina", regular: 0.93, premium: 1.04, brand: "Puma", address: "Aeropuerto" }
        ];

        function renderStations(filtered) {
            const grid = document.getElementById('stationsGrid');
            grid.innerHTML = '';
            
            filtered.forEach(s => {
                grid.innerHTML += `
                    <div class="glass p-6 rounded-2xl shadow-md border-l-8 border-red-500 transition hover:scale-102">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-xl text-gray-800">${s.name}</h3>
                                <p class="text-gray-500"><i class="fas fa-map-marker-alt"></i> ${s.town}, PR</p>
                            </div>
                            <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm font-bold">${s.brand}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-gray-50 p-3 rounded-xl text-center">
                                <p class="text-xs text-gray-400 uppercase">Regular</p>
                                <p class="text-2xl font-black text-gray-700">$${s.regular}</p>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-xl text-center">
                                <p class="text-xs text-gray-400 uppercase">Premium</p>
                                <p class="text-2xl font-black text-red-600">$${s.premium}</p>
                            </div>
                        </div>

                        <button onclick="window.open('https://www.google.com/maps/search/${s.name}+${s.town}')" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-black transition">
                            Como llegar <i class="fas fa-external-link-alt ml-2"></i>
                        </button>
                    </div>
                `;
            });
        }

        // Search and Filter logic
        const input = document.getElementById('searchInput');
        const filter = document.getElementById('brandFilter');

        function update() {
            const term = input.value.toLowerCase();
            const brand = filter.value;
            
            const filtered = stations.filter(s => {
                const matchesSearch = s.town.toLowerCase().includes(term) || s.name.toLowerCase().includes(term);
                const matchesBrand = brand === 'all' || s.brand === brand;
                return matchesSearch && matchesBrand;
            });
            renderStations(filtered);
        }

        input.oninput = update;
        filter.onchange = update;

        // Initial render
        renderStations(stations);
    </script>
</body>
</html>
